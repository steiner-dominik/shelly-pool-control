name: Build, publish and release

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: server/requirements*.txt

      - name: Install server dependencies
        run: pip install -r server/requirements.txt -r server/requirements-dev.txt

      - name: Ruff lint
        run: ruff check server

      - name: Python tests (incl. shared logic vectors)
        run: python -m pytest server/tests -q

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Shelly script vectors (mJS core against shared vectors)
        run: node shelly/test/run-vectors.mjs

      - name: Shelly script bundle + size check
        run: node shelly/build.mjs

      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the CalVer tag + GitHub release
      packages: write   # push the image to GHCR
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history + tags, needed for CalVer counting

      # CalVer with a mandatory counter: YYYY.MM.DD.1 for the first release of
      # a (UTC) day, .2, .3, … for further releases on the same day.
      - name: Compute CalVer version
        id: ver
        if: github.event_name != 'pull_request'
        run: |
          base="$(date -u +%Y.%m.%d)"
          n=1
          version="$base.$n"
          while git rev-parse -q --verify "refs/tags/$version" >/dev/null; do
            n=$((n+1)); version="$base.$n"
          done
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=${{ steps.ver.outputs.version }},enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            VERSION=${{ steps.ver.outputs.version || 'dev' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Shelly script release bundle
        if: github.event_name != 'pull_request'
        run: |
          node shelly/build.mjs --version "${{ steps.ver.outputs.version }}"
          cd shelly/build && zip -r ../../dist-shelly-scripts.zip . && cd ../..

      - name: Create GitHub release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ steps.ver.outputs.version }}"
          git tag "$V" "${{ github.sha }}"
          git push origin "refs/tags/$V"
          gh release create "$V" \
            dist-shelly-scripts.zip \
            deploy/docker-compose.example.yml \
            deploy/env.example \
            --title "$V" \
            --generate-notes \
            --notes "Container image: \`ghcr.io/${{ github.repository }}:$V\` (linux/amd64 + linux/arm64). Quick start: download \`docker-compose.example.yml\` + \`env.example\` below. \`dist-shelly-scripts.zip\` contains the ready-to-upload Shelly scripts for this version."
